<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="18" fill="#f8fafc"/>
  <!-- Central hub -->
  <circle cx="90" cy="90" r="16" fill="#1772d0" opacity="0.9"/>
  <circle cx="90" cy="90" r="8" fill="#f09228"/>
  <!-- Outer nodes -->
  <circle cx="90" cy="32" r="10" fill="#1772d0" opacity="0.7"/>
  <circle cx="90" cy="148" r="10" fill="#1772d0" opacity="0.7"/>
  <circle cx="32" cy="90" r="10" fill="#1772d0" opacity="0.7"/>
  <circle cx="148" cy="90" r="10" fill="#1772d0" opacity="0.7"/>
  <circle cx="47" cy="47" r="10" fill="#1772d0" opacity="0.5"/>
  <circle cx="133" cy="47" r="10" fill="#1772d0" opacity="0.5"/>
  <circle cx="47" cy="133" r="10" fill="#1772d0" opacity="0.5"/>
  <circle cx="133" cy="133" r="10" fill="#1772d0" opacity="0.5"/>
  <!-- Spokes to hub -->
  <g stroke="#1772d0" stroke-width="1.5" opacity="0.6">
    <line x1="90" y1="42" x2="90" y2="74"/>
    <line x1="90" y1="106" x2="90" y2="138"/>
    <line x1="42" y1="90" x2="74" y2="90"/>
    <line x1="106" y1="90" x2="138" y2="90"/>
    <line x1="54" y1="54" x2="78" y2="78"/>
    <line x1="126" y1="54" x2="102" y2="78"/>
    <line x1="54" y1="126" x2="78" y2="102"/>
    <line x1="126" y1="126" x2="102" y2="102"/>
  </g>
  <!-- Orbit ring -->
  <circle cx="90" cy="90" r="58" stroke="#1772d0" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="4 4"/>
</svg>
