<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220">
  <rect width="760" height="220" fill="#f8fafc"/>

  <!-- Inputs: retrieved chunks -->
  <text x="80" y="32" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="1.5">RETRIEVED</text>
  <rect x="36" y="44" width="88" height="20" rx="3" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <line x1="44" y1="54" x2="116" y2="54" stroke="#1772d0" stroke-width="1" opacity="0.5"/>
  <rect x="36" y="70" width="88" height="20" rx="3" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <line x1="44" y1="80" x2="116" y2="80" stroke="#1772d0" stroke-width="1" opacity="0.5"/>
  <rect x="36" y="96" width="88" height="20" rx="3" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <line x1="44" y1="106" x2="116" y2="106" stroke="#1772d0" stroke-width="1" opacity="0.5"/>

  <!-- Generated answer -->
  <text x="80" y="138" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="1.5">GENERATED</text>
  <rect x="36" y="150" width="88" height="46" rx="4" fill="#1772d0"/>
  <line x1="44" y1="162" x2="116" y2="162" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <line x1="44" y1="172" x2="110" y2="172" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <line x1="44" y1="182" x2="116" y2="182" stroke="#fff" stroke-width="1" opacity="0.6"/>

  <!-- Arrows in to scorer -->
  <line x1="128" y1="80" x2="232" y2="100" stroke="#1772d0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="128" y1="172" x2="232" y2="124" stroke="#1772d0" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Faithfulness scorer (diamond) -->
  <polygon points="320,52 388,112 320,172 252,112" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.8"/>
  <text x="320" y="100" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#1772d0">faithfulness</text>
  <text x="320" y="116" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#1772d0">scorer</text>
  <text x="320" y="135" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" fill="#888">supported?</text>

  <!-- Score badge -->
  <rect x="288" y="180" width="64" height="18" rx="9" fill="#1772d0"/>
  <text x="320" y="193" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#fff">score: 0–1</text>

  <!-- Pass branch (top right) -->
  <line x1="388" y1="92" x2="468" y2="64" stroke="#1772d0" stroke-width="1.8"/>
  <polygon points="464,60 472,64 464,68" fill="#1772d0"/>
  <text x="425" y="60" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-style="italic" font-weight="700" fill="#1772d0">pass</text>
  <text x="425" y="84" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" fill="#888">score &gt; 0.8</text>

  <rect x="478" y="40" width="120" height="50" rx="6" fill="#1772d0"/>
  <polyline points="510,66 524,80 552,52" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="538" y="78" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#fff">ship</text>

  <!-- Fail branches (bottom right) -->
  <line x1="388" y1="132" x2="468" y2="160" stroke="#f09228" stroke-width="1.8"/>
  <polygon points="464,156 472,160 464,164" fill="#f09228"/>
  <text x="425" y="156" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-style="italic" font-weight="700" fill="#f09228">fail</text>
  <text x="425" y="178" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" fill="#888">score &lt; 0.8</text>

  <!-- Two fail outcomes -->
  <rect x="478" y="120" width="160" height="32" rx="6" fill="#f09228" opacity="0.85"/>
  <text x="558" y="140" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#fff">"I don't know"</text>

  <rect x="478" y="160" width="160" height="32" rx="6" fill="#f09228" opacity="0.85"/>
  <text x="558" y="180" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#fff">re-retrieve / escalate</text>

  <!-- Loop arrow back from re-retrieve -->
  <path d="M 638 176 Q 700 176 700 60 Q 700 30 320 30" fill="none" stroke="#f09228" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <polygon points="324,26 316,30 324,34" fill="#f09228" opacity="0.6"/>
</svg>
