<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="18" fill="#f8fafc"/>
  <!-- Tree structure: root -->
  <rect x="72" y="20" width="36" height="22" rx="5" fill="#1772d0" opacity="0.9"/>
  <text x="90" y="35" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">main()</text>
  <!-- Level 2 branches -->
  <rect x="28" y="62" width="44" height="20" rx="5" fill="#1772d0" opacity="0.7"/>
  <text x="50" y="75" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">auth()</text>
  <rect x="108" y="62" width="44" height="20" rx="5" fill="#1772d0" opacity="0.7"/>
  <text x="130" y="75" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">api()</text>
  <!-- Level 3 branches -->
  <rect x="14" y="104" width="36" height="18" rx="4" fill="#1772d0" opacity="0.5"/>
  <text x="32" y="117" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">login()</text>
  <rect x="56" y="104" width="36" height="18" rx="4" fill="#1772d0" opacity="0.5"/>
  <text x="74" y="117" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">verify()</text>
  <rect x="108" y="104" width="36" height="18" rx="4" fill="#1772d0" opacity="0.5"/>
  <text x="126" y="117" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">route()</text>
  <!-- Tree lines -->
  <g stroke="#1772d0" stroke-width="1.2" opacity="0.5">
    <line x1="90" y1="42" x2="50" y2="62"/>
    <line x1="90" y1="42" x2="130" y2="62"/>
    <line x1="50" y1="82" x2="32" y2="104"/>
    <line x1="50" y1="82" x2="74" y2="104"/>
    <line x1="130" y1="82" x2="126" y2="104"/>
  </g>
  <!-- Search magnifier -->
  <circle cx="140" cy="148" r="16" fill="none" stroke="#f09228" stroke-width="2" opacity="0.85"/>
  <line x1="151" y1="159" x2="162" y2="170" stroke="#f09228" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Search cross-hair inside -->
  <line x1="132" y1="148" x2="148" y2="148" stroke="#f09228" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="140" x2="140" y2="156" stroke="#f09228" stroke-width="1" opacity="0.5"/>
</svg>
