<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="18" fill="#f8fafc"/>
  <!-- Axes -->
  <line x1="28" y1="140" x2="162" y2="140" stroke="#1772d0" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="140" x2="28" y2="28" stroke="#1772d0" stroke-width="1.5" opacity="0.6"/>
  <!-- Axis labels -->
  <text x="95" y="158" font-family="monospace" font-size="8" fill="#1772d0" text-anchor="middle" opacity="0.6">time</text>
  <text x="14" y="90" font-family="monospace" font-size="7" fill="#1772d0" text-anchor="middle" opacity="0.6" transform="rotate(-90,14,90)">demand</text>
  <!-- Historical bars -->
  <g fill="#1772d0" opacity="0.5">
    <rect x="36" y="110" width="12" height="30" rx="2"/>
    <rect x="54" y="100" width="12" height="40" rx="2"/>
    <rect x="72" y="90" width="12" height="50" rx="2"/>
    <rect x="90" y="80" width="12" height="60" rx="2"/>
  </g>
  <!-- Forecast bars (lighter) -->
  <g fill="#1772d0" opacity="0.25">
    <rect x="108" y="68" width="12" height="72" rx="2"/>
    <rect x="126" y="56" width="12" height="84" rx="2"/>
    <rect x="144" y="44" width="12" height="96" rx="2"/>
  </g>
  <!-- Forecast trend line -->
  <polyline points="42,110 60,100 78,90 96,80 114,68 132,56 150,44"
    stroke="#f09228" stroke-width="2" fill="none" stroke-dasharray="4 2" opacity="0.9"/>
  <!-- Confidence band -->
  <polygon points="108,60 126,45 144,30 144,58 126,67 108,76"
    fill="#f09228" opacity="0.1"/>
  <!-- Threshold line -->
  <line x1="28" y1="62" x2="162" y2="62" stroke="#e05252" stroke-width="1" opacity="0.5" stroke-dasharray="3 3"/>
  <text x="164" y="65" font-family="monospace" font-size="7" fill="#e05252" opacity="0.7">cap</text>
  <!-- Divider between historical and forecast -->
  <line x1="104" y1="30" x2="104" y2="140" stroke="#1772d0" stroke-width="1" opacity="0.3" stroke-dasharray="2 3"/>
  <text x="104" y="25" font-family="monospace" font-size="7" fill="#1772d0" text-anchor="middle" opacity="0.5">now</text>
</svg>
