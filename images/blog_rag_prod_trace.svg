  <rect x="40" y="218" width="14" height="14" rx="2" fill="#1772d0"/>
  <text x="62" y="230" font-family="Lato, sans-serif" font-size="11" fill="#555">LLM call (dominates latency &amp; cost)</text>

  <rect x="290" y="218" width="14" height="14" rx="2" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
