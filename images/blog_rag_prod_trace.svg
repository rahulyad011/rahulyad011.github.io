  <text x="180" y="76" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#1772d0">rewrite</text>
  <text x="290" y="76" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#1772d0">retrieve</text>
  <text x="400" y="76" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#1772d0">rerank</text>
