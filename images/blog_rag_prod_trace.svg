  <rect x="450" y="218" width="14" height="14" rx="2" fill="#fff" stroke="#f09228" stroke-width="1"/>
  <text x="472" y="230" font-family="Lato, sans-serif" font-size="11" fill="#555">flagged: high latency &amp; tokens</text>

  <text x="20" y="266" font-family="Lato, sans-serif" font-size="10" font-style="italic" fill="#888">every stage logged: query, prompt, scores, latency, tokens, cost</text>
