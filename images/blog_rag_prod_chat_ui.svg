<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220">
  <rect width="760" height="220" fill="#f8fafc"/>

  <!-- Browser-window outer frame -->
  <rect x="40" y="20" width="680" height="180" rx="10" fill="#fff" stroke="#1772d0" stroke-width="1.5"/>
  <!-- Window dots -->
  <circle cx="60" cy="36" r="4" fill="#e8f0fb" stroke="#1772d0" stroke-width="0.8"/>
  <circle cx="74" cy="36" r="4" fill="#e8f0fb" stroke="#1772d0" stroke-width="0.8"/>
  <circle cx="88" cy="36" r="4" fill="#e8f0fb" stroke="#1772d0" stroke-width="0.8"/>
  <line x1="40" y1="52" x2="720" y2="52" stroke="#1772d0" stroke-width="1" opacity="0.3"/>

  <!-- User question bubble -->
  <rect x="60" y="64" width="260" height="22" rx="11" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <text x="190" y="79" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#1772d0">what's the SLA on B2B refunds?</text>

  <!-- Answer card -->
  <rect x="60" y="96" width="540" height="62" rx="6" fill="#1772d0"/>
  <text x="76" y="118" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#fff">Answer</text>
  <line x1="76" y1="126" x2="582" y2="126" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="76" y1="138" x2="580" y2="138" stroke="#fff" stroke-width="1" opacity="0.55"/>
  <line x1="76" y1="148" x2="540" y2="148" stroke="#fff" stroke-width="1" opacity="0.55"/>

  <!-- "Sources" label -->
  <text x="60" y="178" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="1">SOURCES</text>

  <!-- Citation chips -->
  <rect x="125" y="166" width="120" height="20" rx="10" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <circle cx="140" cy="176" r="5" fill="#1772d0"/>
  <text x="146" y="180" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">B2B-Terms §4.2</text>

  <rect x="252" y="166" width="120" height="20" rx="10" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <circle cx="267" cy="176" r="5" fill="#1772d0"/>
  <text x="273" y="180" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">SLA-2024.pdf p.7</text>

  <rect x="379" y="166" width="120" height="20" rx="10" fill="#e8f0fb" stroke="#1772d0" stroke-width="1"/>
  <circle cx="394" cy="176" r="5" fill="#1772d0"/>
  <text x="400" y="180" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Refund-Policy §1</text>

  <!-- Thumbs up/down -->
  <g transform="translate(620,168)">
    <circle cx="14" cy="9" r="13" fill="none" stroke="#1772d0" stroke-width="1.2"/>
    <path d="M 8 12 L 8 9 L 12 9 L 12 5 L 14 5 L 16 9 L 19 9 L 19 14 L 12 14 Z" fill="#1772d0" opacity="0.7"/>
  </g>
  <g transform="translate(656,168)">
    <circle cx="14" cy="9" r="13" fill="none" stroke="#f09228" stroke-width="1.2"/>
    <path d="M 8 6 L 8 9 L 12 9 L 12 13 L 14 13 L 16 9 L 19 9 L 19 4 L 12 4 Z" fill="#f09228" opacity="0.7" transform="rotate(180,13.5,9)"/>
  </g>

  <!-- Annotation arrows (educational labels) -->
  <line x1="600" y1="120" x2="640" y2="120" stroke="#f09228" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="640" y1="120" x2="640" y2="100" stroke="#f09228" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="640" y="92" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-style="italic" fill="#f09228">grounded answer</text>

  <line x1="500" y1="186" x2="540" y2="206" stroke="#f09228" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="600" y="216" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-style="italic" fill="#f09228">verifiable sources &middot; feedback loop</text>
</svg>
