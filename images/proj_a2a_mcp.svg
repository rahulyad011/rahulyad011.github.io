<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="18" fill="#f8fafc"/>
  <!-- Left agent box -->
  <rect x="18" y="70" width="52" height="40" rx="8" fill="#1772d0" opacity="0.8"/>
  <text x="44" y="95" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">A</text>
  <!-- Right agent box -->
  <rect x="110" y="70" width="52" height="40" rx="8" fill="#1772d0" opacity="0.8"/>
  <text x="136" y="95" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">B</text>
  <!-- Arrow left to right -->
  <g stroke="#f09228" stroke-width="2" fill="none" opacity="0.9">
    <line x1="72" y1="83" x2="108" y2="83"/>
    <polyline points="102,78 108,83 102,88"/>
  </g>
  <!-- Arrow right to left -->
  <g stroke="#1772d0" stroke-width="2" fill="none" opacity="0.7">
    <line x1="108" y1="97" x2="72" y2="97"/>
    <polyline points="78,92 72,97 78,102"/>
  </g>
  <!-- MCP protocol bar -->
  <rect x="62" y="122" width="56" height="18" rx="5" fill="#f09228" opacity="0.85"/>
  <text x="90" y="135" font-family="monospace" font-size="9" fill="#222" text-anchor="middle" font-weight="bold">MCP</text>
  <!-- Connector lines to MCP bar -->
  <line x1="44" y1="110" x2="78" y2="122" stroke="#1772d0" stroke-width="1" opacity="0.5"/>
  <line x1="136" y1="110" x2="102" y2="122" stroke="#1772d0" stroke-width="1" opacity="0.5"/>
  <!-- Top label -->
  <text x="90" y="52" font-family="monospace" font-size="9" fill="#1772d0" text-anchor="middle" opacity="0.8">A2A</text>
  <line x1="55" y1="55" x2="125" y2="55" stroke="#1772d0" stroke-width="1" opacity="0.4"/>
</svg>
