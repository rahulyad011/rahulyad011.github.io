<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 360" width="1040" height="360">
  <!-- Background -->
  <rect width="1040" height="360" fill="#f8fafc"/>

  <!-- ── Tier labels ── -->
  <text x="40" y="62" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#888" letter-spacing="2">POC</text>
  <line x1="40" y1="70" x2="120" y2="70" stroke="#888" stroke-width="1" opacity="0.4"/>

  <text x="40" y="222" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#1772d0" letter-spacing="2">PRODUCTION</text>
  <line x1="160" y1="218" x2="240" y2="218" stroke="#1772d0" stroke-width="1" opacity="0.6"/>

  <!-- ── POC Tier (faded) ── opacity 0.5 group -->
  <g opacity="0.5">
    <!-- Docs -->
    <rect x="120" y="90" width="100" height="60" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
    <line x1="135" y1="108" x2="200" y2="108" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="135" y1="118" x2="200" y2="118" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="135" y1="128" x2="180" y2="128" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
    <text x="170" y="172" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#1772d0">Docs</text>

    <!-- Arrow -->
    <line x1="225" y1="120" x2="320" y2="120" stroke="#1772d0" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="320,116 328,120 320,124" fill="#1772d0"/>

    <!-- Retrieve -->
    <rect x="335" y="90" width="100" height="60" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
    <circle cx="380" cy="115" r="11" fill="none" stroke="#1772d0" stroke-width="1.5"/>
    <line x1="388" y1="123" x2="395" y2="130" stroke="#1772d0" stroke-width="2" stroke-linecap="round"/>
    <text x="385" y="172" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#1772d0">Retrieve</text>

    <!-- Arrow -->
    <line x1="440" y1="120" x2="535" y2="120" stroke="#1772d0" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="535,116 543,120 535,124" fill="#1772d0"/>

    <!-- LLM -->
    <rect x="550" y="90" width="100" height="60" rx="6" fill="#1772d0"/>
    <text x="600" y="120" text-anchor="middle" font-family="Lato, sans-serif" font-size="14" font-weight="700" fill="#fff">LLM</text>
    <line x1="565" y1="135" x2="635" y2="135" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="600" y="172" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#1772d0">Generate</text>

    <!-- Arrow -->
    <line x1="655" y1="120" x2="750" y2="120" stroke="#1772d0" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="750,116 758,120 750,124" fill="#1772d0"/>

    <!-- Answer -->
    <rect x="765" y="90" width="100" height="60" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
    <polyline points="800,120 815,135 840,105" fill="none" stroke="#1772d0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="815" y="172" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#1772d0">Answer</text>
  </g>

  <!-- Divider between tiers -->
  <line x1="40" y1="200" x2="1000" y2="200" stroke="#1772d0" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- ── Production Tier (full opacity) ── -->
  <!-- Docs -->
  <rect x="40" y="240" width="80" height="56" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
  <line x1="52" y1="256" x2="108" y2="256" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="52" y1="265" x2="108" y2="265" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="52" y1="274" x2="92" y2="274" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
  <text x="80" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Docs</text>

  <line x1="125" y1="268" x2="148" y2="268" stroke="#1772d0" stroke-width="1.5"/>
  <polygon points="148,264 156,268 148,272" fill="#1772d0"/>

  <!-- Chunker -->
  <rect x="160" y="240" width="80" height="56" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
  <rect x="170" y="252" width="22" height="10" rx="2" fill="#1772d0" opacity="0.7"/>
  <rect x="195" y="252" width="22" height="10" rx="2" fill="#1772d0" opacity="0.7"/>
  <rect x="170" y="265" width="22" height="10" rx="2" fill="#1772d0" opacity="0.7"/>
  <rect x="195" y="265" width="22" height="10" rx="2" fill="#1772d0" opacity="0.7"/>
  <rect x="170" y="278" width="22" height="10" rx="2" fill="#1772d0" opacity="0.7"/>
  <rect x="195" y="278" width="22" height="10" rx="2" fill="#1772d0" opacity="0.7"/>
  <text x="200" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Chunk</text>

  <line x1="245" y1="268" x2="268" y2="268" stroke="#1772d0" stroke-width="1.5"/>
  <polygon points="268,264 276,268 268,272" fill="#1772d0"/>

  <!-- Hybrid Retrieval -->
  <rect x="280" y="240" width="100" height="56" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
  <text x="330" y="263" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-weight="700" fill="#1772d0">BM25</text>
  <text x="330" y="276" text-anchor="middle" font-family="Lato, sans-serif" font-size="8" fill="#888">+</text>
  <text x="330" y="289" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-weight="700" fill="#1772d0">Vector</text>
  <text x="330" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Hybrid Retrieve</text>

  <line x1="385" y1="268" x2="408" y2="268" stroke="#1772d0" stroke-width="1.5"/>
  <polygon points="408,264 416,268 408,272" fill="#1772d0"/>

  <!-- Reranker -->
  <rect x="420" y="240" width="80" height="56" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
  <line x1="432" y1="252" x2="488" y2="252" stroke="#1772d0" stroke-width="2" opacity="0.9"/>
  <line x1="432" y1="262" x2="478" y2="262" stroke="#1772d0" stroke-width="2" opacity="0.7"/>
  <line x1="432" y1="272" x2="468" y2="272" stroke="#1772d0" stroke-width="2" opacity="0.5"/>
  <line x1="432" y1="282" x2="458" y2="282" stroke="#1772d0" stroke-width="2" opacity="0.3"/>
  <text x="460" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Rerank</text>

  <line x1="505" y1="268" x2="528" y2="268" stroke="#1772d0" stroke-width="1.5"/>
  <polygon points="528,264 536,268 528,272" fill="#1772d0"/>

  <!-- LLM -->
  <rect x="540" y="240" width="80" height="56" rx="6" fill="#1772d0"/>
  <text x="580" y="266" text-anchor="middle" font-family="Lato, sans-serif" font-size="13" font-weight="700" fill="#fff">LLM</text>
  <line x1="552" y1="278" x2="608" y2="278" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <text x="580" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Generate</text>

  <line x1="625" y1="268" x2="648" y2="268" stroke="#1772d0" stroke-width="1.5"/>
  <polygon points="648,264 656,268 648,272" fill="#1772d0"/>

  <!-- Faithfulness check -->
  <rect x="660" y="240" width="90" height="56" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
  <circle cx="690" cy="268" r="10" fill="none" stroke="#1772d0" stroke-width="1.5"/>
  <polyline points="685,268 689,272 696,263" fill="none" stroke="#1772d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="725" y="265" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-weight="700" fill="#1772d0">faith</text>
  <text x="725" y="277" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-weight="700" fill="#1772d0">check</text>
  <text x="705" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Faithfulness</text>

  <line x1="755" y1="268" x2="778" y2="268" stroke="#1772d0" stroke-width="1.5"/>
  <polygon points="778,264 786,268 778,272" fill="#1772d0"/>

  <!-- Citations + Answer -->
  <rect x="790" y="240" width="100" height="56" rx="6" fill="#e8f0fb" stroke="#1772d0" stroke-width="1.5"/>
  <line x1="800" y1="252" x2="880" y2="252" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="800" y1="262" x2="868" y2="262" stroke="#1772d0" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="800" y="270" width="14" height="6" rx="2" fill="#1772d0" opacity="0.5"/>
  <rect x="816" y="270" width="14" height="6" rx="2" fill="#1772d0" opacity="0.5"/>
  <rect x="832" y="270" width="14" height="6" rx="2" fill="#1772d0" opacity="0.5"/>
  <text x="840" y="316" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#1772d0">Cited Answer</text>

  <!-- ── Annotation badges (orange) ── -->
  <!-- Observability tap -->
  <line x1="580" y1="240" x2="580" y2="220" stroke="#f09228" stroke-width="1.5" stroke-dasharray="2,2"/>
  <rect x="540" y="206" width="90" height="16" rx="4" fill="#f09228"/>
  <text x="585" y="218" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-weight="700" fill="#fff">observability tap</text>

  <!-- "I don't know" fallback branch -->
  <line x1="705" y1="296" x2="705" y2="320" stroke="#f09228" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="705" y1="320" x2="600" y2="320" stroke="#f09228" stroke-width="1.5" stroke-dasharray="2,2"/>
  <rect x="540" y="328" width="125" height="18" rx="4" fill="#f09228"/>
  <text x="602" y="341" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-weight="700" fill="#fff">fallback: "I don't know"</text>

  <!-- Reranker query rewrite loop -->
  <path d="M 460 240 Q 460 220 360 220 Q 280 220 280 240" fill="none" stroke="#1772d0" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <polygon points="276,236 280,244 284,236" fill="#1772d0" opacity="0.6"/>
  <text x="375" y="216" text-anchor="middle" font-family="Lato, sans-serif" font-size="9" font-style="italic" fill="#1772d0" opacity="0.7">query rewrite</text>
</svg>
